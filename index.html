<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lihat Lebih Dekat</title>
<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #fff;
    color: #1d1d1f;
}

/* Section utama */
.section-look {
    text-align: center;
    padding: 80px 20px;
}

.section-look h2 {
    font-size: 2.5rem;
    margin-bottom: 16px;
}

.section-look p {
    font-size: 1rem;
    color: #555;
    margin-bottom: 40px;
}

/* Gambar besar */
.look-image {
    position: relative;
    display: inline-block;
    cursor: pointer;
    max-width: 800px;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
}

.look-image:hover {
    transform: scale(1.02);
}

/* Tombol play di tengah gambar */
.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.8);
    border-radius: 50%;
    width: 80px;
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    color: #000;
    transition: background 0.3s ease, transform 0.3s ease;
}

.play-button:hover {
    background: rgba(255,255,255,1);
    transform: translate(-50%, -50%) scale(1.1);
}

/* Lightbox overlay */
.video-lightbox {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 20px;
}

.video-lightbox iframe {
    width: 100%;
    max-width: 900px;
    height: 500px;
    border: none;
    border-radius: 12px;
}

/* Close button */
.close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 2rem;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    transition: color 0.3s;
}

.close-btn:hover {
    color: #ccc;
}
</style>
</head>
<body>

<section class="section-look">
    <h2>Lihat Lebih Dekat</h2>
    <p>Temukan fitur terbaru dan kehebatan iPhone dalam video ini.</p>

    <!-- Gambar + tombol play -->
    <div class="look-image" id="lookImage">
        <img src="https://via.placeholder.com/800x450" alt="iPhone Video Preview">
        <div class="play-button">&#9658;</div>
    </div>
</section>

<!-- Lightbox Video -->
<div class="video-lightbox" id="videoLightbox">
    <span class="close-btn" id="closeBtn">&times;</span>
    <iframe id="videoFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</div>

<script>
const lookImage = document.getElementById('lookImage');
const lightbox = document.getElementById('videoLightbox');
const closeBtn = document.getElementById('closeBtn');
const videoFrame = document.getElementById('videoFrame');

// URL video YouTube / Vimeo
const videoURL = "https://www.youtube.com/embed/ScMzIvxBSi4?autoplay=1";

lookImage.addEventListener('click', () => {
    videoFrame.src = videoURL;
    lightbox.style.display = 'flex';
});

closeBtn.addEventListener('click', () => {
    lightbox.style.display = 'none';
    videoFrame.src = ""; // stop video
});

// Klik di luar video juga menutup
lightbox.addEventListener('click', (e) => {
    if(e.target === lightbox){
        lightbox.style.display = 'none';
        videoFrame.src = "";
    }
});
</script>

</body>
</html>
