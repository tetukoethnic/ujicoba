<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jelajahi Jajarannya</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #fff;
  color: #1d1d1f;
  margin: 0;
  padding: 0;
}

.product-lineup {
  text-align: center;
  padding: 60px 20px;
}

.product-lineup h2 {
  font-size: 2rem;
  margin-bottom: 40px;
}

.product-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
}

.product-card {
  background: #f9f9f9;
  border-radius: 20px;
  padding: 20px;
  width: 220px;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}

.product-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

.product-card img {
  width: 100%;
  border-radius: 15px;
}

.product-card h3 {
  margin: 15px 0 10px;
  font-size: 1.2rem;
}

.product-card p {
  font-size: 0.95rem;
  color: #555;
}

.colors {
  margin: 10px 0;
}

.color {
  display: inline-block;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  margin-right: 5px;
  border: 1px solid #ddd;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 16px;
  border-radius: 12px;
  background: #0071e3;
  color: #fff;
  text-decoration: none;
  font-weight: 500;
  transition: background 0.3s;
}

.btn:hover {
  background: #005bb5;
}

@media (max-width: 768px) {
  .product-grid {
    flex-direction: column;
    align-items: center;
  }
}
</style>
</head>
<body>

<section class="product-lineup">
  <h2>Jelajahi Jajarannya</h2>
  <div class="product-grid">
    <div class="product-card">
      <img src="https://via.placeholder.com/220x240?text=iPhone+Pro" alt="iPhone Pro">
      <h3>iPhone Pro</h3>
      <p>Desain inovatif dengan performa tinggi</p>
      <div class="colors">
        <span class="color" style="background:#000;"></span>
        <span class="color" style="background:#fff;"></span>
        <span class="color" style="background:#ff0;"></span>
      </div>
      <a href="#" class="btn">Selengkapnya</a>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/220x240?text=iPhone+Standar" alt="iPhone Standar">
      <h3>iPhone Standar</h3>
      <p>Lebih tipis dan menyenangkan digunakan</p>
      <div class="colors">
        <span class="color" style="background:#ccc;"></span>
        <span class="color" style="background:#f00;"></span>
      </div>
      <a href="#" class="btn">Selengkapnya</a>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/220x240?text=iPhone+Mini" alt="iPhone Mini">
      <h3>iPhone Mini</h3>
      <p>Kompak dan ringkas, tetap bertenaga</p>
      <div class="colors">
        <span class="color" style="background:#0f0;"></span>
        <span class="color" style="background:#00f;"></span>
      </div>
      <a href="#" class="btn">Selengkapnya</a>
    </div>

  </div>
</section>

</body>
</html>
