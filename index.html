<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Lihat Lebih Dekat</title>
<style>
/* CSS Section Lihat Lebih Dekat */
.section-look-apple {
    text-align: center;
    padding: 80px 20px;
    background: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

.look-title {
    font-size: 2.8rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #1d1d1f;
}

.look-subtitle {
    font-size: 1.1rem;
    color: #6e6e73;
    margin-bottom: 32px;
}

.video-preview {
    position: relative;
    display: inline-block;
    max-width: 100%;
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.video-preview img {
    width: 100%;
    display: block;
}

.video-preview:hover {
    transform: scale(1.02);
    box-shadow: 0 12px 30px rgba(0,0,0,0.18);
}

/* Play button */
.play-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90px;
    height: 90px;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.3s ease;
}

.play-icon {
    width: 0;
    height: 0;
    border-left: 28px solid #000;
    border-top: 16px solid transparent;
    border-bottom: 16px solid transparent;
}

.play-wrap:hover {
    background: rgba(255,255,255,1);
    transform: translate(-50%, -50%) scale(1.12);
}

/* Lightbox overlay */
.video-overlay {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width: 100%;
    height:100%;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.video-container {
    position: relative;
    width: 90%;
    max-width: 900px;
    aspect-ratio: 16/9;
}

.video-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 12px;
}

/* Close button */
.close-video {
    position: absolute;
    top: -20px;
    right: -20px;
    font-size: 2.8rem;
    color: #fff;
    cursor: pointer;
}
</style>
</head>
<body>

<section class="section-look-apple">
  <div class="look-inner">
    <h2 class="look-title">Lihat Lebih Dekat</h2>
    <p class="look-subtitle">Temukan semua detail yang membuat iPhone begitu istimewa.</p>

    <div class="video-preview" id="videoPreview">
      <img src="https://via.placeholder.com/1200x700" alt="Preview Video">
      <div class="play-wrap">
        <div class="play-icon"></div>
      </div>
    </div>
  </div>
</section>

<div class="video-overlay" id="videoOverlay">
  <div class="video-container">
    <span class="close-video" id="closeVideo">&times;</span>
    <iframe id="iframeVideo" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script>
const preview = document.getElementById("videoPreview");
const overlay = document.getElementById("videoOverlay");
const closeBtn = document.getElementById("closeVideo");
const iframe = document.getElementById("iframeVideo");

const videoLink = "https://www.youtube.com/embed/ScMzIvxBSi4?autoplay=1";

preview.addEventListener("click", () => {
    iframe.src = videoLink;
    overlay.style.display = "flex";
});

closeBtn.addEventListener("click", () => {
    overlay.style.display = "none";
    iframe.src = ""; 
});

overlay.addEventListener("click", (e) => {
    if (e.target === overlay) {
        overlay.style.display = "none";
        iframe.src = "";
    }
});
</script>

</body>
</html>
