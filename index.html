```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Style Search</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* BODY */

body{
height:200vh;
background:#f5f5f7;
}


/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:48px;
background:rgba(255,255,255,0.75);
backdrop-filter: blur(20px);
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.nav-container{
width:100%;
max-width:1100px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.menu{
display:flex;
gap:25px;
list-style:none;
font-size:14px;
color:#333;
}

.menu li{
cursor:pointer;
opacity:0.8;
transition:0.3s;
}

.menu li:hover{
opacity:1;
}

.icons{
display:flex;
gap:20px;
font-size:18px;
cursor:pointer;
}


/* SEARCH OVERLAY */

.search-overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(255,255,255,0.95);
backdrop-filter:blur(20px);

display:flex;
justify-content:center;
align-items:flex-start;

opacity:0;
visibility:hidden;

transition:all .4s ease;

z-index:2000;
}

.search-overlay.active{
opacity:1;
visibility:visible;
}


/* SEARCH BOX */

.search-container{
width:100%;
max-width:680px;
margin-top:120px;
padding:0 20px;
}

.search-bar{
display:flex;
align-items:center;
border-bottom:1px solid #d2d2d7;
padding-bottom:10px;
}

.search-bar input{
flex:1;
border:none;
outline:none;
font-size:26px;
background:none;
}

.close-btn{
font-size:20px;
cursor:pointer;
margin-left:10px;
opacity:0.7;
}

.close-btn:hover{
opacity:1;
}


/* SUGGESTION */

.suggestions{
margin-top:40px;
}

.suggestions h4{
font-size:12px;
color:#6e6e73;
margin-bottom:10px;
}

.suggestions ul{
list-style:none;
}

.suggestions li{
padding:10px 0;
font-size:18px;
cursor:pointer;
color:#1d1d1f;
}

.suggestions li:hover{
color:#0071e3;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<header class="navbar">

<div class="nav-container">

<div class="logo"></div>

<ul class="menu">
<li>Store</li>
<li>Mac</li>
<li>iPad</li>
<li>iPhone</li>
<li>Watch</li>
<li>AirPods</li>
<li>TV</li>
</ul>

<div class="icons">
<span id="searchBtn">🔍</span>
</div>

</div>

</header>


<!-- SEARCH OVERLAY -->

<div class="search-overlay" id="searchOverlay">

<div class="search-container">

<div class="search-bar">

<input type="text" placeholder="Search apple.com">

<span class="close-btn" id="closeSearch">✕</span>

</div>


<div class="suggestions">

<h4>Quick Links</h4>

<ul>
<li>iPhone 15</li>
<li>MacBook Air</li>
<li>Apple Watch</li>
<li>AirPods Pro</li>
<li>Apple Vision Pro</li>
</ul>

</div>

</div>

</div>


<script>

const searchBtn = document.getElementById("searchBtn")
const closeBtn = document.getElementById("closeSearch")
const overlay = document.getElementById("searchOverlay")

searchBtn.onclick = () => {
overlay.classList.add("active")
}

closeBtn.onclick = () => {
overlay.classList.remove("active")
}

</script>

</body>
</html>
```
